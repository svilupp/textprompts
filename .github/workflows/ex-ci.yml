name: Elixir CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/textprompts-ex/**'
      - 'testdata/**'
      - '.github/workflows/ex-ci.yml'
  pull_request:
    paths:
      - 'packages/textprompts-ex/**'
      - 'testdata/**'
      - '.github/workflows/ex-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: '1.17.3'
            otp: '26.2'
          - elixir: '1.18.3'
            otp: '27.2'
    defaults:
      run:
        working-directory: packages/textprompts-ex
    steps:
      - uses: actions/checkout@v4

      - name: Setup Elixir/OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            packages/textprompts-ex/deps
            packages/textprompts-ex/_build
          key: ex-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('packages/textprompts-ex/mix.lock') }}

      - name: Install deps
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test
